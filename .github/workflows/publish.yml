name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
      - name: Build
        run: uv build
      - name: Audit sdist for secrets
        run: |
          set -euo pipefail
          SDIST=$(ls dist/*.tar.gz)
          echo "Auditing $SDIST"
          BAD_FILES=$(tar tzf "$SDIST" | grep -iE '\.env($|\.)|mcpregistry|_token$|_secret$|\.pem$|id_rsa' || true)
          if [ -n "$BAD_FILES" ]; then
            echo "::error::Dangerous files found in sdist:"
            echo "$BAD_FILES"
            exit 1
          fi
          TEMP_DIR=$(mktemp -d)
          tar xzf "$SDIST" -C "$TEMP_DIR"
          LEAKED=$(grep -rE 'ghu_[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}|ghs_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9]{20,}|pypi-[A-Za-z0-9]{20,}|github_pat_' "$TEMP_DIR" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Token patterns found in sdist content:"
            echo "$LEAKED" | sed "s|$TEMP_DIR/||"
            exit 1
          fi
          echo "sdist audit passed"
          rm -rf "$TEMP_DIR"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
